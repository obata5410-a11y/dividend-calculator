name: Keep Alive

on:
  schedule:
    - cron: "*/10 * * * *"   # 10分ごと
  workflow_dispatch:          # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://dividend-calculator-6rsz.onrender.com/health)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: unexpected status $STATUS"
            exit 1
          fi
